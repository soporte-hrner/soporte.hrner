<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soporte Informático</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f6f8;
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: #2c3e50;
    }
    p {
      color: #555;
    }
    .container {
      max-width: 500px;
      margin: auto;
    }
    .btn {
      display: block;
      margin: 15px 0;
      padding: 15px;
      background-color: #0078D4;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
    }
    .btn:hover {
      background-color: #005ea6;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Soporte Informático</h1>
  <p>Selecciona una opción:</p>

  <a class="btn" href="#">Reportar problema técnico</a>
  <a class="btn" href="#">Solicitar usuario</a>
  <a class="btn" href="#">Solicitar equipo</a>

</div>

</body>
</html>
